<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BUPT-NR525 | 实验室内部课程资料站</title>
  <meta name="description" content="BUPT-NR525，北京邮电大学实验室内部课程资料站。" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <h1 class="brand-title">BUPT-NR525</h1>
        <p class="brand-subtitle">北京邮电大学 · NR525实验室内部课程资料站</p>
      </div>
      <nav class="nav">
        <a href="./courses/index.html">所有课程</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div>
          <span class="badge">Course Archive</span>
          <h2>课程资料导航</h2>
          <p>点击下方课程卡片，查看课程适用方向、授课老师与资料类型。</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="./courses/index.html">查看所有课程</a>
            <form class="search-form" action="./courses/index.html" method="get" role="search">
              <span class="search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="2"></circle>
                  <path d="M16 16L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
              </span>
              <input
                type="search"
                name="q"
                placeholder="搜索课程名、教师或资料..."
                aria-label="搜索课程名、教师或资料"
              />
            </form>
          </div>
        </div>
      </div>
    </section>

    <section id="courses">
      <div class="container">
        <div class="section-heading">
          <h3>最近更新 (Recently Updated)</h3>
          <p>展示近期上传了新作业、笔记或期末卷的活跃课程。</p>
        </div>

        <div class="courses-grid" id="recent-courses"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">© 2026 BUPT-NR525</div>
  </footer>

  <script src="./assets/js/courses-data.js"></script>
  <script>
    function renderCourseCard(course) {
      const tags = [
        ...(course.programs || []),
        ...((course.teachers || []).map((teacher) => `教师: ${teacher}`)),
        ...(course.resources || [])
      ];

      return `
        <article class="course-card">
          <div class="course-top">
            <div>
              <h5 class="course-title">${course.name}</h5>
              <p class="course-meta">最近更新：${course.lastUpdated}</p>
            </div>
            <span class="tag tag-soft">${(course.programs || []).join("/") || "未标注"}</span>
          </div>
          <div class="tags">
            ${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
        </article>
      `;
    }

    const recentCourses = [...window.coursesList]
      .sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated))
      .slice(0, 6);

    const recentContainer = document.getElementById("recent-courses");
    recentContainer.innerHTML = recentCourses.map(renderCourseCard).join("");
  </script>
</body>
</html>
